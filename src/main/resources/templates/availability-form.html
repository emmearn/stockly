<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stockly - Disponibilita</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <div class="topbar">
    <a class="brand" href="/stock">Stockly</a>
    <nav aria-label="Navigazione principale">
      <a href="/stock">Stock</a>
      <a href="/orders/new">Nuovo ordine</a>
      <a href="/orders">Ordini</a>
    </nav>
  </div>
</header>
<main>
  <div class="page-title">
    <div>
      <h1>Disponibilita</h1>
      <p class="muted">Imposta la quantita disponibile per articolo e magazzino.</p>
    </div>
    <a class="button secondary" href="/stock">Torna allo stock</a>
  </div>

  <div class="alert error" th:if="${error}" th:text="${error}">Errore</div>

  <form class="form-panel" action="/stock/availability" method="post" th:object="${form}">
    <div class="field">
      <label for="itemId">Articolo</label>
      <select id="itemId" th:field="*{itemId}">
        <option value="">Seleziona articolo</option>
        <option th:each="item : ${items}" th:value="${item.id}"
                th:text="${item.name + ' - ' + item.brand + ' (' + item.barcode + ')'}">Bullone M8</option>
      </select>
      <div class="field-error" th:if="${#fields.hasErrors('itemId')}" th:errors="*{itemId}">Errore articolo</div>
    </div>

    <div class="field">
      <label for="warehouseId">Magazzino</label>
      <select id="warehouseId" th:field="*{warehouseId}">
        <option value="">Seleziona magazzino</option>
        <option th:each="warehouse : ${warehouses}" th:value="${warehouse.id}"
                th:text="${warehouse.name}">Elmas</option>
      </select>
      <div class="field-error" th:if="${#fields.hasErrors('warehouseId')}" th:errors="*{warehouseId}">Errore magazzino</div>
    </div>

    <div class="availability-panel" id="currentAvailabilityPanel" aria-live="polite">
      <span class="muted">Seleziona articolo e magazzino per vedere la quantita attuale.</span>
    </div>

    <div hidden>
      <span th:each="stock : ${stockRows}"
            class="stock-data"
            th:attr="data-item-id=${stock.item.id},data-warehouse-id=${stock.warehouse.id},data-quantity=${stock.quantity}"></span>
    </div>

    <div class="field">
      <label for="quantity">Quantita</label>
      <div class="stepper">
        <button class="stepper-button" id="decrementQuantity" type="button" aria-label="Diminuisci quantita">-</button>
        <input id="quantity" type="number" min="0" th:field="*{quantity}">
        <button class="stepper-button" id="incrementQuantity" type="button" aria-label="Aumenta quantita">+</button>
      </div>
      <div class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}">Errore quantita</div>
    </div>

    <button type="submit">Salva disponibilita</button>
  </form>
</main>
<script>
  const itemSelect = document.getElementById('itemId');
  const warehouseSelect = document.getElementById('warehouseId');
  const quantityInput = document.getElementById('quantity');
  const currentAvailabilityPanel = document.getElementById('currentAvailabilityPanel');
  const decrementQuantity = document.getElementById('decrementQuantity');
  const incrementQuantity = document.getElementById('incrementQuantity');
  const stockRows = Array.from(document.querySelectorAll('.stock-data'));

  function currentQuantity() {
    const itemId = itemSelect.value;
    const warehouseId = warehouseSelect.value;

    if (!itemId || !warehouseId) {
      return null;
    }

    const stock = stockRows.find((row) =>
      row.dataset.itemId === itemId && row.dataset.warehouseId === warehouseId
    );
    return stock ? Number(stock.dataset.quantity) : 0;
  }

  function updateCurrentAvailability() {
    const quantity = currentQuantity();

    if (quantity === null) {
      currentAvailabilityPanel.innerHTML =
        '<span class="muted">Seleziona articolo e magazzino per vedere la quantita attuale.</span>';
      return;
    }

    quantityInput.value = String(quantity);
    currentAvailabilityPanel.innerHTML = '<strong>Quantita attuale:</strong> ' + quantity + ' pezzi.';
    updateDecrementState();
  }

  function updateDecrementState() {
    const quantity = Number(quantityInput.value || 0);
    decrementQuantity.disabled = quantity <= 0;
  }

  itemSelect.addEventListener('change', updateCurrentAvailability);
  warehouseSelect.addEventListener('change', updateCurrentAvailability);
  quantityInput.addEventListener('input', () => {
    if (Number(quantityInput.value) < 0) {
      quantityInput.value = '0';
    }
    updateDecrementState();
  });
  decrementQuantity.addEventListener('click', () => {
    const quantity = Math.max(0, Number(quantityInput.value || 0) - 1);
    quantityInput.value = String(quantity);
    updateDecrementState();
  });
  incrementQuantity.addEventListener('click', () => {
    const quantity = Number(quantityInput.value || 0) + 1;
    quantityInput.value = String(quantity);
    updateDecrementState();
  });
  if (itemSelect.value && warehouseSelect.value) {
    updateCurrentAvailability();
  }
  else {
    updateDecrementState();
  }
</script>
</body>
</html>
